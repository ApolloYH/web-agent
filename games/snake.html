<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>贪吃蛇 · Snake</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --grid: #334155;
      --snake: #22c55e;
      --snake-head: #4ade80;
      --food: #f43f5e;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #60a5fa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      user-select: none;
    }
    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .sub {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    .hud {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 0.75rem;
      font-variant-numeric: tabular-nums;
      font-size: 0.95rem;
    }
    .hud strong { color: var(--accent); }
    canvas {
      background: var(--panel);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.06);
      image-rendering: pixelated;
      max-width: min(92vw, 480px);
      width: 100%;
      height: auto;
      touch-action: none;
    }
    .hint {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      line-height: 1.6;
    }
    .btns {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #0f172a;
    }
    button.secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--grid);
    }
    button:hover { filter: brightness(1.08); }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.72);
      border-radius: 12px;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    .wrap {
      position: relative;
      width: min(92vw, 480px);
    }
    .overlay h2 { margin: 0; font-size: 1.35rem; }
    .overlay p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    .pad {
      display: none;
      margin-top: 0.75rem;
      grid-template-columns: 60px 60px 60px;
      grid-template-rows: 50px 50px 50px;
      gap: 6px;
      justify-content: center;
    }
    .pad button {
      width: 60px;
      height: 50px;
      padding: 0;
      font-size: 1.1rem;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--grid);
    }
    .pad .up { grid-column: 2; grid-row: 1; }
    .pad .left { grid-column: 1; grid-row: 2; }
    .pad .down { grid-column: 2; grid-row: 2; }
    .pad .right { grid-column: 3; grid-row: 2; }
    @media (max-width: 640px) {
      .pad { display: grid; }
      .hint .desk { display: none; }
    }
  </style>
</head>
<body>
  <h1>🐍 贪吃蛇</h1>
  <p class="sub">吃到红点变长 · 撞墙或撞自己就结束</p>
  <div class="hud">
    <div>得分 <strong id="score">0</strong></div>
    <div>最高 <strong id="best">0</strong></div>
    <div>速度 <strong id="speed">1</strong>x</div>
  </div>
  <div class="wrap">
    <canvas id="game" width="400" height="400" aria-label="贪吃蛇游戏画布"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="title">按空格开始</h2>
      <p id="msg">方向键或 WASD 控制</p>
    </div>
  </div>
  <div class="btns">
    <button type="button" id="btnStart">开始 / 暂停</button>
    <button type="button" class="secondary" id="btnRestart">重新开始</button>
  </div>
  <div class="pad" aria-label="触屏方向键">
    <button type="button" class="up" data-dir="up">↑</button>
    <button type="button" class="left" data-dir="left">←</button>
    <button type="button" class="down" data-dir="down">↓</button>
    <button type="button" class="right" data-dir="right">→</button>
  </div>
  <p class="hint">
    <span class="desk">↑↓←→ 或 WASD 移动 · 空格 开始/暂停 · R 重开</span>
    <span class="mobile">可用下方方向键</span>
  </p>
  <script>
    const COLS = 20;
    const ROWS = 20;
    const CELL = 20; // 400/20

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const speedEl = document.getElementById("speed");
    const overlay = document.getElementById("overlay");
    const titleEl = document.getElementById("title");
    const msgEl = document.getElementById("msg");

    const BEST_KEY = "snake-best-score";
    let best = Number(localStorage.getItem(BEST_KEY) || 0);
    bestEl.textContent = String(best);

    /** @type {{x:number,y:number}[]} */
    let snake;
    /** @type {{x:number,y:number}} */
    let dir;
    /** @type {{x:number,y:number}|null} */
    let nextDir;
    /** @type {{x:number,y:number}} */
    let food;
    let score;
    let running = false;
    let dead = false;
    let tickMs = 140;
    let timer = null;

    function reset() {
      snake = [
        { x: 8, y: 10 },
        { x: 7, y: 10 },
        { x: 6, y: 10 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = null;
      score = 0;
      tickMs = 140;
      dead = false;
      running = false;
      placeFood();
      updateHud();
      showOverlay("按空格开始", "方向键或 WASD 控制");
      draw();
    }

    function placeFood() {
      const taken = new Set(snake.map((s) => `${s.x},${s.y}`));
      let x, y;
      do {
        x = Math.floor(Math.random() * COLS);
        y = Math.floor(Math.random() * ROWS);
      } while (taken.has(`${x},${y}`));
      food = { x, y };
    }

    function updateHud() {
      scoreEl.textContent = String(score);
      speedEl.textContent = (140 / tickMs).toFixed(1);
      if (score > best) {
        best = score;
        localStorage.setItem(BEST_KEY, String(best));
        bestEl.textContent = String(best);
      }
    }

    function showOverlay(title, msg) {
      overlay.style.display = "flex";
      titleEl.textContent = title;
      msgEl.textContent = msg;
    }
    function hideOverlay() {
      overlay.style.display = "none";
    }

    function setDir(nx, ny) {
      // no reverse
      if (dir.x + nx === 0 && dir.y + ny === 0) return;
      nextDir = { x: nx, y: ny };
    }

    function step() {
      if (nextDir) {
        dir = nextDir;
        nextDir = null;
      }
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      // wall
      if (head.x < 0 || head.y < 0 || head.x >= COLS || head.y >= ROWS) {
        return gameOver();
      }
      // self
      if (snake.some((s) => s.x === head.x && s.y === head.y)) {
        return gameOver();
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        // speed up slightly
        tickMs = Math.max(60, tickMs - 3);
        restartTimer();
        placeFood();
        updateHud();
      } else {
        snake.pop();
      }
      draw();
    }

    function gameOver() {
      dead = true;
      running = false;
      clearInterval(timer);
      timer = null;
      showOverlay("游戏结束", `得分 ${score} · 空格或点「重新开始」`);
    }

    function restartTimer() {
      clearInterval(timer);
      if (running) timer = setInterval(step, tickMs);
    }

    function toggle() {
      if (dead) {
        reset();
        start();
        return;
      }
      if (running) {
        running = false;
        clearInterval(timer);
        timer = null;
        showOverlay("已暂停", "空格继续");
      } else {
        start();
      }
    }

    function start() {
      if (dead) reset();
      running = true;
      hideOverlay();
      restartTimer();
    }

    function draw() {
      // background
      ctx.fillStyle = "#1e293b";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // grid
      ctx.strokeStyle = "rgba(51,65,85,0.6)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL + 0.5, 0);
        ctx.lineTo(i * CELL + 0.5, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * CELL + 0.5);
        ctx.lineTo(canvas.width, j * CELL + 0.5);
        ctx.stroke();
      }
      // food
      ctx.fillStyle = "#f43f5e";
      roundCell(food.x, food.y, 5);
      // snake
      snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? "#4ade80" : "#22c55e";
        roundCell(s.x, s.y, 4);
      });
    }

    function roundCell(x, y, r) {
      const px = x * CELL + 2;
      const py = y * CELL + 2;
      const w = CELL - 4;
      const h = CELL - 4;
      ctx.beginPath();
      ctx.moveTo(px + r, py);
      ctx.arcTo(px + w, py, px + w, py + h, r);
      ctx.arcTo(px + w, py + h, px, py + h, r);
      ctx.arcTo(px, py + h, px, py, r);
      ctx.arcTo(px, py, px + w, py, r);
      ctx.closePath();
      ctx.fill();
    }

    window.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      if (k === "arrowup" || k === "w") { e.preventDefault(); setDir(0, -1); if (!running && !dead) start(); }
      else if (k === "arrowdown" || k === "s") { e.preventDefault(); setDir(0, 1); if (!running && !dead) start(); }
      else if (k === "arrowleft" || k === "a") { e.preventDefault(); setDir(-1, 0); if (!running && !dead) start(); }
      else if (k === "arrowright" || k === "d") { e.preventDefault(); setDir(1, 0); if (!running && !dead) start(); }
      else if (k === " " || k === "enter") { e.preventDefault(); toggle(); }
      else if (k === "r") { e.preventDefault(); reset(); }
    });

    document.getElementById("btnStart").onclick = () => toggle();
    document.getElementById("btnRestart").onclick = () => { reset(); start(); };
    document.querySelectorAll(".pad button").forEach((btn) => {
      btn.addEventListener("click", () => {
        const d = btn.getAttribute("data-dir");
        if (d === "up") setDir(0, -1);
        if (d === "down") setDir(0, 1);
        if (d === "left") setDir(-1, 0);
        if (d === "right") setDir(1, 0);
        if (!running && !dead) start();
      });
    });

    reset();
  </script>
</body>
</html>
