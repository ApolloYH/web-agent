name: Check OpenDesign upstream
on:
  schedule:
    - cron: '23 1 * * 1'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-open-design-upstream.mjs
